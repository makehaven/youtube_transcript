services:
  youtube_transcript.commands:
    class: Drupal\youtube_transcript\Commands\YoutubeTranscriptCommands
    arguments: ['@youtube_transcript.fetcher']
    tags:
      - { name: drush.command }

  youtube_transcript.chapter_extraction_commands:
    class: Drupal\youtube_transcript\Commands\ChapterExtractionCommands
    arguments: ['@entity_type.manager', '@ai.provider']
    tags:
      - { name: drush.command }
